<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<title>明末 UI 编辑器</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;background:#0a0806;font-family:"PingFang SC","Microsoft YaHei",sans-serif}

#tb{
  position:fixed;top:0;left:0;right:0;height:36px;z-index:9999;
  display:flex;align-items:center;gap:8px;padding:0 12px;
  background:rgba(6,4,2,0.95);border-bottom:1px solid rgba(200,160,50,0.3);
  font-size:12px;color:#c8a840;
}
#tb b{color:#e8c050;font-size:13px;}
#tb button{padding:2px 10px;cursor:pointer;font-size:12px;border:1px solid rgba(200,160,50,0.4);background:rgba(40,28,8,0.9);color:#e0c060;border-radius:3px;}
#tb button:hover{background:rgba(70,50,12,0.95);}
#tb .red{color:#f08060;border-color:rgba(200,80,50,0.4);}
#tb .sep{width:1px;height:20px;background:rgba(200,160,50,0.2);}
#tb #st{margin-left:auto;font-size:11px;color:#60b060;}

#wrap{position:fixed;top:36px;left:0;right:0;bottom:36px;display:flex;align-items:center;justify-content:center;overflow:hidden;}
#canvas{position:relative;background:url('/ming-1627-terrain-map.png') center/cover no-repeat,#1a1810;overflow:hidden;}

/* 可编辑元素通用 */
.el{position:absolute;cursor:grab;user-select:none;}
.el:hover{outline:1.5px dashed rgba(255,210,60,0.5);}
.el.sel{outline:2px solid rgba(255,210,60,0.95)!important;z-index:8888!important;}
.lbl{position:absolute;top:-18px;left:0;background:rgba(0,0,0,0.75);color:#ffd040;font-size:10px;padding:1px 5px;border-radius:2px;white-space:nowrap;pointer-events:none;opacity:0;font-family:sans-serif;z-index:1;}
.el:hover .lbl,.el.sel .lbl{opacity:1;}
.rh{position:absolute;right:-5px;bottom:-5px;width:11px;height:11px;background:rgba(255,210,60,0.9);border:1px solid rgba(100,70,0,0.6);border-radius:2px;cursor:nwse-resize;display:none;}
.el.sel .rh{display:block;}

/* 顶部状态栏 */
#e-statusbar{top:8px;left:8px;display:flex;align-items:center;gap:6px;padding:7px 10px;border:1px solid rgba(0,0,0,0.2);border-radius:6px;background:rgba(234,226,207,0.95);box-shadow:0 4px 14px rgba(0,0,0,0.3);font-size:0.88rem;color:#1a1410;white-space:nowrap;}
.emblem{width:24px;height:24px;object-fit:contain;}
.pill{display:inline-flex;align-items:center;gap:4px;padding:3px 7px;border-radius:3px;font-size:0.88rem;}
.pill.warn{background:rgba(200,140,30,0.12);}
.pill.good{background:rgba(60,180,80,0.1);}
.money{display:inline-flex;flex-direction:column;line-height:1.1;padding:3px 7px;}
.money small{font-size:0.66rem;font-weight:700;}
.money small.exp{color:#ef8b72;}
.money small.inc{color:#6fd095;}

/* 单独图标 */
.cmd-el{display:flex;flex-direction:column;align-items:center;gap:4px;position:relative;}
.cmd-el img{width:100%;height:auto;object-fit:contain;display:block;filter:drop-shadow(0 6px 10px rgba(15,8,4,0.6));}
.cmd-el .cap{display:flex;flex-direction:column;align-items:center;line-height:1.2;text-align:center;}
.cmd-el .cap b{color:#ffe7b5;font-size:0.82rem;font-weight:700;}
.cmd-el .cap small{color:rgba(245,215,158,0.72);font-size:0.7rem;}
.badge{position:absolute;top:-6px;right:-8px;min-width:19px;height:19px;padding:0 4px;border:1px solid rgba(255,238,190,0.55);border-radius:999px;color:#fff2cf;background:linear-gradient(180deg,#c0432f,#7c241b);font-size:0.72rem;font-weight:700;display:grid;place-items:center;}

/* 玉玺 */
#e-edict{display:grid;place-items:center;background:transparent;overflow:visible;}
#e-edict img{width:100%;height:100%;object-fit:contain;display:block;filter:drop-shadow(0 4px 6px rgba(18,7,2,0.58));}
#e-edict .ecopy{position:absolute;bottom:-30px;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;pointer-events:none;white-space:nowrap;}
#e-edict .ecopy b{color:#fff1c9;font-size:1.2rem;font-weight:800;text-shadow:0 2px 4px rgba(25,9,3,0.62);}
#e-edict .ecopy small{color:rgba(255,231,181,0.78);font-size:0.78rem;}
#e-edict .ebadge{position:absolute;top:-10px;right:-20px;min-width:19px;height:19px;padding:0 4px;border:1px solid rgba(255,238,190,0.55);border-radius:999px;color:#fff2cf;background:linear-gradient(180deg,#c0432f,#7c241b);font-size:0.72rem;font-weight:700;display:grid;place-items:center;}

/* 右侧导航 */
#e-rightnav{display:flex;flex-direction:column;gap:2px;padding:6px 0;background:rgba(30,18,10,0.88);border-radius:6px 0 0 6px;border:1px solid rgba(226,180,86,0.22);border-right:none;box-shadow:-3px 0 12px rgba(0,0,0,0.35);}
.rnb{display:flex;align-items:center;justify-content:center;width:36px;height:36px;border:none;background:transparent;color:rgba(226,200,150,0.82);font-size:1.05rem;font-weight:700;cursor:pointer;border-radius:4px;}
.rnb.act{background:rgba(157,57,43,0.75);color:#ffd08a;}

#insp{position:fixed;bottom:0;left:0;right:0;height:36px;z-index:9999;display:flex;align-items:center;gap:6px;padding:0 12px;background:rgba(6,4,2,0.95);border-top:1px solid rgba(200,160,50,0.2);font-size:12px;color:#c8a840;}
#iname{font-weight:700;color:#f0d040;min-width:90px;}
#insp label{color:#806830;font-size:11px;}
#insp input{width:68px;padding:2px 5px;background:rgba(20,14,4,0.9);border:1px solid rgba(180,130,40,0.35);color:#e8d080;border-radius:3px;font-size:12px;}
#insp input:focus{outline:none;border-color:rgba(220,170,50,0.7);}
</style>
</head>
<body>

<div id="tb">
  <b>🎨 UI编辑器</b>
  <span style="color:#706030;font-size:11px;">点击选中 → 拖拽移动 / resize角标缩放 / 方向键微调(Shift=10px)</span>
  <div class="sep"></div>
  <button onclick="saveAll()">💾 保存</button>
  <button onclick="resetAll()" class="red">重置</button>
  <button onclick="exportCSS()">📋 导出CSS</button>
  <span id="st"></span>
</div>

<div id="wrap"><div id="canvas">

  <!-- 顶部状态栏 -->
  <div class="el" id="e-statusbar" data-label="顶部状态栏">
    <span class="lbl">顶部状态栏</span>
    <img class="emblem" src="/icon_ming_emblem.png" alt=""/>
    <span style="font-weight:700;font-size:0.92rem;">崇祯元年 正月</span>
    <span class="money">国库 <b>2400万两</b><small class="exp">月 -120万两</small></span>
    <span class="money">内库 <b>800万两</b><small class="inc">月 +20万两</small></span>
    <span class="pill warn">民心 <b>52</b></span>
    <span class="pill good">皇威 <b>68</b></span>
    <span style="display:inline-flex;align-items:center;gap:4px;padding:3px 8px;font-size:0.88rem;">☰ 菜单</span>
    <div class="rh"></div>
  </div>

  <!-- 四个底部图标（各自独立） -->
  <div class="el cmd-el" id="e-zoushu" data-label="奏疏" style="width:120px;">
    <span class="lbl">奏疏</span>
    <img src="/ui/exact/zoushu.png" alt=""/>
    <span class="badge">3</span>
    <span class="cap"><b>奏疏</b><small>3 件待览</small></span>
    <div class="rh"></div>
  </div>

  <div class="el cmd-el" id="e-mingxi" data-label="邸报详明" style="width:120px;">
    <span class="lbl">邸报详明</span>
    <img src="/ui/exact/mingxi.png" alt=""/>
    <span class="cap"><b>邸报详明</b><small>数项加减/账目明细</small></span>
    <div class="rh"></div>
  </div>

  <div class="el cmd-el" id="e-miling" data-label="密令" style="width:120px;">
    <span class="lbl">密令</span>
    <img src="/ui/exact/miling.png" alt=""/>
    <span class="cap"><b>密令</b><small>暂无密令</small></span>
    <div class="rh"></div>
  </div>

  <div class="el cmd-el" id="e-lishi" data-label="史册" style="width:120px;">
    <span class="lbl">史册</span>
    <img src="/ui/exact/lishi.png" alt=""/>
    <span class="cap"><b>史册</b><small>历代奏报/诏书</small></span>
    <div class="rh"></div>
  </div>

  <!-- 玉玺 -->
  <div class="el" id="e-edict" data-label="拟诏玉玺" style="width:180px;height:180px;">
    <span class="lbl">拟诏玉玺</span>
    <img src="/ui/exact/nizhao.png" alt=""/>
    <span class="ebadge">2</span>
    <span class="ecopy"><b>拟诏</b><small>2 道</small></span>
    <div class="rh"></div>
  </div>

  <!-- 右侧导航 -->
  <div class="el" id="e-rightnav" data-label="右侧导航栏">
    <span class="lbl">右侧导航栏</span>
    <button class="rnb">政</button>
    <button class="rnb">内</button>
    <button class="rnb act">兵</button>
    <button class="rnb">省</button>
    <button class="rnb">工</button>
    <button class="rnb">户</button>
    <button class="rnb">吏</button>
    <button class="rnb" style="border-top:1px solid rgba(226,180,86,0.18);color:rgba(180,220,160,0.75);">目</button>
    <div class="rh"></div>
  </div>

</div></div>

<div id="insp">
  <span id="iname">— 未选中 —</span>
  <div style="width:1px;height:20px;background:rgba(200,160,50,0.2);flex-shrink:0;"></div>
  <label>left</label><input id="i-left"   type="text" placeholder="auto" oninput="setprop('left',this.value)">
  <label>top</label><input id="i-top"     type="text" placeholder="auto" oninput="setprop('top',this.value)">
  <label>right</label><input id="i-right" type="text" placeholder="auto" oninput="setprop('right',this.value)">
  <label>bottom</label><input id="i-bottom" type="text" placeholder="auto" oninput="setprop('bottom',this.value)">
  <label>width</label><input id="i-width" type="text" placeholder="auto" oninput="setprop('width',this.value)">
  <label>height</label><input id="i-height" type="text" placeholder="auto" oninput="setprop('height',this.value)">
  <label>gap</label><input id="i-gap" type="text" placeholder="—" oninput="setprop('gap',this.value)">
  <label>font-size</label><input id="i-fs" type="text" placeholder="inherit" oninput="setprop('fontSize',this.value)">
</div>

<script>
const SKEY="ming-ui-ed-v5";
let ov={};
try{ov=JSON.parse(localStorage.getItem(SKEY)||"{}");}catch{}

const canvas=document.getElementById("canvas");

// 16:9 sizing
function resize(){
  const wrap=document.getElementById("wrap");
  const w=Math.min(wrap.clientWidth,wrap.clientHeight*16/9);
  canvas.style.width=w+"px";
  canvas.style.height=(w*9/16)+"px";
  applyAll();
}
window.addEventListener("resize",resize);

function applyAll(){
  for(const [id,styles] of Object.entries(ov)){
    const el=document.getElementById(id);
    if(!el) continue;
    for(const [p,v] of Object.entries(styles)) el.style[p]=v;
  }
}

// 初始默认位置（canvas 尺寸确定后再设）
const DEFAULTS={
  "e-statusbar":  {top:"8px",left:"8px"},
  "e-zoushu":     {bottom:"60px",left:"calc(50% - 270px)"},
  "e-mingxi":     {bottom:"60px",left:"calc(50% - 130px)"},
  "e-miling":     {bottom:"60px",left:"calc(50% + 20px)"},
  "e-lishi":      {bottom:"60px",left:"calc(50% + 160px)"},
  "e-edict":      {bottom:"26px",right:"28px"},
  "e-rightnav":   {top:"50%",right:"0",transform:"translateY(-50%)"},
};

function applyDefaults(){
  for(const [id,styles] of Object.entries(DEFAULTS)){
    const el=document.getElementById(id);
    if(!el||ov[id]) continue; // skip if user has saved override
    for(const [p,v] of Object.entries(styles)) el.style[p]=v;
  }
}

// selection
let sel=null;
function selectEl(el){
  if(sel) sel.classList.remove("sel");
  sel=el;
  if(sel){
    sel.classList.add("sel");
    document.getElementById("iname").textContent=sel.dataset.label||sel.id;
    syncInsp();
  } else {
    document.getElementById("iname").textContent="— 未选中 —";
  }
}
canvas.addEventListener("click",()=>selectEl(null));

function syncInsp(){
  if(!sel) return;
  const s=sel.style;
  document.getElementById("i-left").value=s.left||"";
  document.getElementById("i-top").value=s.top||"";
  document.getElementById("i-right").value=s.right||"";
  document.getElementById("i-bottom").value=s.bottom||"";
  document.getElementById("i-width").value=s.width||"";
  document.getElementById("i-height").value=s.height||"";
  document.getElementById("i-gap").value=s.gap||"";
  document.getElementById("i-fs").value=s.fontSize||"";
}

function setprop(prop,val){
  if(!sel) return;
  sel.style[prop]=val;
  const id=sel.id;
  if(!ov[id]) ov[id]={};
  ov[id][prop]=val;
  localStorage.setItem(SKEY,JSON.stringify(ov));
  flash();
}

function flash(msg="✓"){
  const el=document.getElementById("st");
  el.textContent=msg;
  clearTimeout(el._t);
  el._t=setTimeout(()=>el.textContent="",1200);
}

// drag + resize
function initEl(el){
  el.addEventListener("click",e=>{e.stopPropagation();selectEl(el);});
  el.addEventListener("mousedown",e=>{
    if(e.button!==0||e.target.classList.contains("rh")) return;
    e.stopPropagation();
    selectEl(el);

    // 锁定当前屏幕位置为 absolute left/top，清除其他定位
    const cx=canvas.getBoundingClientRect();
    const rect=el.getBoundingClientRect();
    const baseL=rect.left-cx.left, baseT=rect.top-cx.top;
    el.style.position="absolute";
    el.style.left=baseL+"px";
    el.style.top=baseT+"px";
    el.style.right="auto";
    el.style.bottom="auto";
    el.style.transform="none";
    el.style.willChange="transform";

    const sx=e.clientX, sy=e.clientY;
    let dx=0, dy=0;

    function onMove(ev){
      dx=ev.clientX-sx; dy=ev.clientY-sy;
      // GPU合成层，零reflow
      el.style.transform=`translate(${dx}px,${dy}px)`;
    }
    function onUp(){
      window.removeEventListener("mousemove",onMove);
      window.removeEventListener("mouseup",onUp);
      // 换算回 left/top，清除 transform
      el.style.transform="none";
      el.style.willChange="auto";
      el.style.left=(baseL+dx)+"px";
      el.style.top=(baseT+dy)+"px";
      el.style.cursor="grab";
      const id=el.id;
      if(!ov[id]) ov[id]={};
      Object.assign(ov[id],{position:"absolute",left:el.style.left,top:el.style.top,right:"auto",bottom:"auto",transform:"none"});
      localStorage.setItem(SKEY,JSON.stringify(ov));
      syncInsp();
      flash();
    }
    window.addEventListener("mousemove",onMove);
    window.addEventListener("mouseup",onUp);
  });

  // resize handle
  const rh=el.querySelector(".rh");
  if(!rh) return;
  rh.addEventListener("mousedown",e=>{
    e.stopPropagation();e.preventDefault();
    const sw=el.offsetWidth,sh=el.offsetHeight,sx=e.clientX,sy=e.clientY;
    function onMove(ev){
      el.style.width=Math.max(20,sw+ev.clientX-sx)+"px";
      el.style.height=Math.max(10,sh+ev.clientY-sy)+"px";
      syncInsp();
    }
    function onUp(){
      window.removeEventListener("mousemove",onMove);
      window.removeEventListener("mouseup",onUp);
      const id=el.id;
      if(!ov[id]) ov[id]={};
      ov[id].width=el.style.width;ov[id].height=el.style.height;
      localStorage.setItem(SKEY,JSON.stringify(ov));
      flash();
    }
    window.addEventListener("mousemove",onMove);
    window.addEventListener("mouseup",onUp);
  });
}

// arrow keys
window.addEventListener("keydown",e=>{
  if(!sel||e.target.tagName==="INPUT") return;
  const step=e.shiftKey?10:1;
  const cx=canvas.getBoundingClientRect();
  const rect=sel.getBoundingClientRect();
  let l=parseFloat(sel.style.left)||(rect.left-cx.left);
  let t=parseFloat(sel.style.top)||(rect.top-cx.top);
  if(e.key==="ArrowLeft"){l-=step;e.preventDefault();}
  if(e.key==="ArrowRight"){l+=step;e.preventDefault();}
  if(e.key==="ArrowUp"){t-=step;e.preventDefault();}
  if(e.key==="ArrowDown"){t+=step;e.preventDefault();}
  sel.style.position="absolute";
  sel.style.left=l+"px";sel.style.top=t+"px";
  sel.style.right="auto";sel.style.bottom="auto";sel.style.transform="none";
  syncInsp();
  const id=sel.id;
  if(!ov[id]) ov[id]={};
  Object.assign(ov[id],{position:"absolute",left:sel.style.left,top:sel.style.top,right:"auto",bottom:"auto",transform:"none"});
  localStorage.setItem(SKEY,JSON.stringify(ov));
});

function saveAll(){localStorage.setItem(SKEY,JSON.stringify(ov));flash("✓ 已保存");}
function resetAll(){if(!confirm("清除所有调整？")) return;localStorage.removeItem(SKEY);location.reload();}
function exportCSS(){
  const lines=[];
  for(const [id,styles] of Object.entries(ov)){
    for(const [p,v] of Object.entries(styles)){
      lines.push(`#${id}{${p.replace(/([A-Z])/g,"-$1").toLowerCase()}:${v};}`);
    }
  }
  const text=lines.join("\n")||"/* 无覆盖 */";
  try{navigator.clipboard.writeText(text);}catch{}
  const ta=Object.assign(document.createElement("textarea"),{value:text});
  ta.style.cssText="position:fixed;top:50px;left:20px;width:80vw;height:40vh;z-index:99999;font-size:12px;font-family:monospace;";
  document.body.appendChild(ta);ta.select();
  try{document.execCommand("copy");}catch{}
  setTimeout(()=>ta.remove(),8000);
  flash("✓ CSS已复制");
}

document.querySelectorAll(".el").forEach(initEl);
resize();
applyDefaults();
</script>
</body>
</html>
